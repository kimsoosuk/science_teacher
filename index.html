    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Initialize Firebase
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Expose to window for React component to use
        window.firebaseApp = app;
        window.auth = auth;
        window.db = db;
        window.signInAnonymously = signInAnonymously;
        window.signInWithCustomToken = signInWithCustomToken;
        window.onAuthStateChanged = onAuthStateChanged;
        window.collection = collection;
        window.addDoc = addDoc;
        window.query = query;
        window.onSnapshot = onSnapshot;
        window.orderBy = orderBy;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.serverTimestamp = serverTimestamp;
    </script>

    <style>

<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons ---
        const BookIcon = ({ className }) => <i data-lucide="book" className={className || "w-5 h-5"}></i>;
        const SearchIcon = ({ className }) => <i data-lucide="search" className={className || "w-5 h-5"}></i>;
        const SendIcon = ({ className }) => <i data-lucide="send" className={className || "w-5 h-5"}></i>;
        const ChevronLeftIcon = ({ className }) => <i data-lucide="chevron-left" className={className || "w-6 h-6"}></i>;
        const SparklesIcon = ({ className }) => <i data-lucide="sparkles" className={className || "w-4 h-4 text-amber-500"}></i>;
        const BeakerIcon = ({ className }) => <i data-lucide="flask-conical" className={className || "w-8 h-8 text-blue-600"}></i>;
        const HomeIcon = ({ className }) => <i data-lucide="home" className={className || "w-5 h-5"}></i>;

        // --- Constants ---
        const APP_ID = window.__app_id || 'kim-suseok-science-app';
        // Primary model followed by fallbacks if rate limits or quota are hit
        const FALLBACK_MODELS = [
            "gemini-3.1-flash-lite",
            "gemini-2.5-flash",
            "gemini-2.5-pro",
            "gemini-2.5-flash-8b"
        ];
        const WORKER_URL = "https://science-teacher.kimsoosuk1.workers.dev/";

        // --- Helper: Date Formatting ---
        const formatDate = (timestamp) => {
            if (!timestamp) return '';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleDateString('ko-KR', { year: 'numeric', month: 'numeric', day: 'numeric' });
        };

        // --- Main Component ---
        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home'); // 'home', 'chat'
            const [searchQuery, setSearchQuery] = useState('');
            const [layerStack, setLayerStack] = useState([]); // [{ id, word, history, recommendations }]
            const [isLoading, setIsLoading] = useState(false);

            // Header Scroll State
            const [showHeader, setShowHeader] = useState(true);
            const [lastScrollY, setLastScrollY] = useState(0);

            // Refs
            const chatEndRef = useRef(null);

            const currentLayer = layerStack.length > 0 ? layerStack[layerStack.length - 1] : null;

            // --- Helper: Process Content (Math + Markdown) ---
            const processContent = (content) => {
                if (!content) return "";

                let processed = content;

                // 1. Render Block Math $$...$$
                processed = processed.replace(/\$\$([\s\S]*?)\$\$/g, (match, tex) => {
                    try {
                        return window.katex.renderToString(tex, { displayMode: true, throwOnError: false });
                    } catch (e) { return match; }
                });

                // 2. Render Inline Math $...$
                processed = processed.replace(/\$([^$\n]+?)\$/g, (match, tex) => {
                    try {
                        return window.katex.renderToString(tex, { displayMode: false, throwOnError: false });
                    } catch (e) { return match; }
                });

                // 3. Render Markdown
                return marked.parse(processed);
            };

            // --- Helper: Fetch Wikipedia Image ---
            const fetchWikipediaImage = async (term) => {
                try {
                    const url = `https://ko.wikipedia.org/w/api.php?action=query&prop=pageimages&format=json&piprop=thumbnail&pithumbsize=600&titles=${encodeURIComponent(term)}&origin=*`;
                    const res = await fetch(url);
                    const data = await res.json();
                    const pages = data.query?.pages;

                    if (pages) {
                        const pageId = Object.keys(pages)[0];
                        if (pageId !== "-1" && pages[pageId].thumbnail) {
                            return pages[pageId].thumbnail.source;
                        }
                    }
                    return null;
                } catch (e) {
                    console.error("Wikipedia image fetch error:", e);
                    return null;
                }
            };

            // --- Authentication & Icons ---
            useEffect(() => {
                const initAuth = async () => {
                    if (!window.auth) {
                        setTimeout(initAuth, 100);
                        return;
                    }
                    try {
                        if (window.__initial_auth_token) {
                            await window.signInWithCustomToken(window.auth, window.__initial_auth_token);
                        } else {
                            await window.signInAnonymously(window.auth);
                        }
                    } catch (err) {
                        console.error("Auth error:", err);
                    }
                };
                initAuth();

                const waitForAuth = setInterval(() => {
                    if (window.auth && window.onAuthStateChanged) {
                        clearInterval(waitForAuth);
                        window.onAuthStateChanged(window.auth, (u) => {
                            setUser(u);
                        });
                    }
                }, 100);

                return () => clearInterval(waitForAuth);
            }, []);

            // --- Icons Effect ---
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, layerStack]);

            // --- Scroll to bottom ---
            const scrollToBottom = () => {
                const scrollContainer = document.getElementById('chat-scroll-container');
                if (scrollContainer) {
                    scrollContainer.scrollTo({
                        top: scrollContainer.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            };

            useEffect(() => {
                scrollToBottom();
            }, [layerStack, isLoading]);

            const handleScroll = (e) => {
                const currentScrollY = e.target.scrollTop;
                if (currentScrollY > lastScrollY + 10 && currentScrollY > 50) {
                    setShowHeader(false); // scrolling down
                } else if (currentScrollY < lastScrollY - 10 || currentScrollY <= 50) {
                    setShowHeader(true); // scrolling up
                }
                setLastScrollY(currentScrollY);
            };

            // --- AI Logic with Universal Payload & Cloudflare Worker ---
            const callGemini = async (prompt, systemInstruction = "") => {
                const baseUrl = WORKER_URL.endsWith('/') ? WORKER_URL.slice(0, -1) : WORKER_URL;
                const delays = [1000, 2000, 4000];
                let lastError = null;

                // 1. Try each model in the fallback chain
                for (let modelIndex = 0; modelIndex < FALLBACK_MODELS.length; modelIndex++) {
                    const currentModel = FALLBACK_MODELS[modelIndex];
                    const payload = {
                        prompt: String(prompt),
                        systemInstruction: String(systemInstruction),
                        model: currentModel
                    };

                    // 2. For each model, try up to 3 times with exponential backoff
                    for (let attempt = 0; attempt < delays.length; attempt++) {
                        try {
                            if (attempt > 0) {
                                console.log(`[Retry] Attempt ${attempt + 1} for model ${currentModel}...`);
                            }
                            if (modelIndex > 0 && attempt === 0) {
                                console.warn(`[Fallback] Primary model failed. Trying fallback model: ${currentModel}`);
                            }

                            let response = await fetch(baseUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });

                            const textResponse = await response.text();

                            if (!response.ok) {
                                let errorMsg = `HTTP ${response.status}`;
                                let isQuotaError = response.status === 429 || response.status === 503;

                                try {
                                    const errData = JSON.parse(textResponse);
                                    if (errData.error) {
                                        errorMsg = typeof errData.error === 'string' ? errData.error : errData.error.message;
                                        // Specific check for model capacity exhausted inside the JSON
                                        if (errorMsg.includes("CAPACITY_EXHAUSTED") || errorMsg.includes("quota") || errorMsg.includes("rate limit")) {
                                            isQuotaError = true;
                                        }
                                    }
                                } catch (e) { }

                                // If it's a quota/capacity error, we should immediately fail this model and try the next fallback
                                if (isQuotaError && modelIndex < FALLBACK_MODELS.length - 1) {
                                    console.warn(`[API] Model ${currentModel} exhausted or rate limited (${errorMsg}). Switching to next fallback.`);
                                    throw new Error("MODEL_EXHAUSTED"); // Break out of retry loop, go to next model
                                }

                                throw new Error(errorMsg);
                            }

                            let data;
                            try {
                                data = JSON.parse(textResponse);
                            } catch (e) {
                                return textResponse;
                            }

                            // Use the valid response
                            const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || data.text || data.response || textResponse;

                            if (!resultText || typeof resultText !== 'string') {
                                throw new Error("응답 데이터 구조를 해석할 수 없습니다.");
                            }

                            return resultText;
                        } catch (error) {
                            lastError = error;

                            // If it's explicitly a capacity error, break the retry loop and move to the next model immediately
                            if (error.message === "MODEL_EXHAUSTED") {
                                break;
                            }

                            console.error(`Attempt ${attempt + 1} for ${currentModel} failed:`, error);

                            // Wait before retrying the SAME model
                            if (attempt < delays.length - 1) {
                                await new Promise(res => setTimeout(res, delays[attempt]));
                            }
                        }
                    }
                }

                // If all models and all retries failed
                throw lastError;
            };

            const parseAIResponse = (text, stackWords = []) => {
                const hasStructuredTags = text.includes('[어원]') && text.includes('[개념]') && text.includes('[스토리]');

                if (hasStructuredTags) {
                    const introMatch = text.match(/\[도입\]([\s\S]*?)(?=\[어원\])/);
                    const originMatch = text.match(/\[어원\]([\s\S]*?)(?=\[어원_설명\]|\[개념\])/);
                    const originDescMatch = text.match(/\[어원_설명\]([\s\S]*?)(?=\[개념\])/);
                    const conceptMatch = text.match(/\[개념\]([\s\S]*?)(?=\[스토리\])/);
                    const storyMatch = text.match(/\[스토리\]([\s\S]*?)(?=\[추천\])/);
                    const recMatch = text.match(/\[추천\]([\s\S]*)$/);

                    let recs = [];
                    if (recMatch) {
                        recs = recMatch[1].split(',').map(s => s.trim().replace(/['"\[\]]/g, '')).filter(word => word && !stackWords.includes(word));
                    }

                    return {
                        isStructured: true,
                        intro: introMatch ? introMatch[1].trim() : "",
                        origin: originMatch ? originMatch[1].trim() : "어원 정보가 없습니다.",
                        originDesc: originDescMatch ? originDescMatch[1].trim() : "",
                        concept: conceptMatch ? conceptMatch[1].trim() : "개념 정보가 없습니다.",
                        story: storyMatch ? storyMatch[1].trim() : "스토리 정보가 없습니다.",
                        recs
                    };
                } else {
                    let cleanText = text;
                    let recs = [];
                    const recMatch = text.match(/\[추천\]([\s\S]*)$/);
                    if (recMatch) {
                        recs = recMatch[1].split(',').map(s => s.trim().replace(/['"\[\]]/g, '')).filter(word => word && !stackWords.includes(word));
                        cleanText = text.replace(/\[추천\][\s\S]*$/, '').trim();
                    }
                    return { isStructured: false, content: cleanText, recs };
                }
            };

            const systemPromptBase = `
                당신은 '김수석' 과학 선생님입니다. 학생이 과학 단어에 대해 질문하면 다음 구조로 설명해주세요.
                
                **핵심 지침:**
                1. **다정한 반말 사용**: 기계적이지 않고, 학생을 아끼는 친절하고 다정한 선생님처럼 편안한 반말로 설명하세요. 자연스러운 말투를 써주세요.
                2. **호칭 금지**: 학생을 지칭하는 호칭은 생략하세요.
                3. **수식/화학식**: 반드시 LaTeX 문법을 사용하고 $ 기호로 감싸주세요. 화살표는 $\\rightarrow$ 를 사용하세요.
                4. **강조 표시**: 핵심 단어나 중요한 설명은 반드시 **별표 두 개로 감싸서**(**강조**) 마크다운 볼드 처리를 해주세요. 특수문자가 그냥 노출되지 않도록 마크다운 문법을 정확히 지켜주세요.
                
                **답변 구조 (반드시 아래의 대괄호 묶인 태그를 포함하여 6개의 섹션으로 정확히 나누어 답변하세요):**
                [도입]
                질문한 단어에 대해 1~2문장으로 아주 간단하고 친절하게 대답하듯 말을 건네주세요. (인사나 자기소개는 생략하고 곧바로 자연스럽게 반응해주세요)
                [어원]
                한자(漢字) 또는 영단어 어원을 분석해주세요. 반드시 마크다운 표(Table)로 정리하세요.
                [어원_설명]
                위 표에서 분석한 어원을 학생에게 말하듯이 다정하고 짧은 줄글로 풀어서 설명해주세요.
                [개념]
                과학적 정의를 명확하게 설명해주세요.
                [스토리]
                잊지 않도록 비유나 짧은 이야기를 들려주세요.
                [추천]
                이 개념을 이해하는데 도움이 되는 '연관된 다른 과학 개념어' 3개를 쉼표로 구분하여 적어주세요.
            `;

            const followUpSystemPrompt = `
                당신은 '김수석' 과학 선생님입니다. 학생과 대화 중입니다.
                
                **상황별 지침:**
                1. 학생이 **새로운 과학 개념어나 단어**에 대해 물어본다면, 이전에 설명했던 단어는 무시하고 **새로운 단어에 대해 ([도입], [어원], [어원_설명], [개념], [스토리], [추천]) 태그를 사용하여** 완벽하게 새롭게 설명해주세요.
                2. 학생이 **이전 설명에 대한 추가 질문(이유, 원리 등)**을 한다면, 형식에 얽매이지 말고 아주 다정하고 친절한 반말로 자연스럽게 원리를 설명해주세요. 단, 마지막에는 반드시 [추천] 태그를 사용하여 연관 개념어 3개를 적어주세요.
                
                **공통 핵심 지침:**
                1. **다정한 반말 사용**: 아주 친절하고 따뜻한 선생님처럼 반말로 설명.
                2. **수식/화학식**: 반드시 LaTeX 문법 사용 ($...$). 화살표는 $\\rightarrow$.
                3. **강조 표시**: 핵심 내용은 반드시 **별표 두 개로 감싸서**(**내용**) 볼드 처리하세요.
            `;

            const handleSearch = async (term) => {
                if (!term.trim()) return;

                setSearchQuery(term);
                setView('chat');

                const newLayer = { id: Date.now(), word: term, history: [], recommendations: [] };
                const userPrompt = `'${term}'에 대해 설명해주세요 선생님!`;
                newLayer.history.push({ role: 'user', content: userPrompt });

                setLayerStack([newLayer]);
                setIsLoading(true);

                try {
                    // AI 설명 생성과 위키백과 이미지 검색을 병렬로 동시에 수행하여 속도 최적화
                    const [responseText, conceptImage] = await Promise.all([
                        callGemini(userPrompt, systemPromptBase),
                        fetchWikipediaImage(term)
                    ]);

                    const stackWords = [term];
                    const parsed = parseAIResponse(responseText, stackWords);

                    setLayerStack(prev => {
                        const newStack = [...prev];
                        const current = newStack[newStack.length - 1];
                        current.history.push({
                            role: 'ai',
                            isStructured: parsed.isStructured,
                            content: parsed.content,
                            intro: parsed.intro,
                            origin: parsed.origin,
                            originDesc: parsed.originDesc,
                            concept: parsed.concept,
                            story: parsed.story,
                            conceptImage: conceptImage,
                            revealed: 1
                        });
                        current.recommendations = parsed.recs;
                        return newStack;
                    });
                } catch (err) {
                    setLayerStack(prev => {
                        const newStack = [...prev];
                        newStack[newStack.length - 1].history.push({ role: 'ai', isStructured: false, content: "미안해, 통신 상태가 좋지 않아서 설명을 못 가져왔어. 잠시 후 다시 시도해줘." });
                        return newStack;
                    });
                } finally {
                    setIsLoading(false);
                }
            };

            const handleRelatedWordClick = async (term) => {
                const newLayer = { id: Date.now(), word: term, history: [], recommendations: [] };
                const userPrompt = `'${term}'에 대해 설명해주세요 선생님!`;
                newLayer.history.push({ role: 'user', content: userPrompt });

                setLayerStack(prev => [...prev, newLayer]);
                setIsLoading(true);

                try {
                    const [responseText, conceptImage] = await Promise.all([
                        callGemini(userPrompt, systemPromptBase),
                        fetchWikipediaImage(term)
                    ]);

                    const stackWords = [...layerStack.map(l => l.word), term];
                    const parsed = parseAIResponse(responseText, stackWords);

                    setLayerStack(prev => {
                        const newStack = [...prev];
                        const current = newStack[newStack.length - 1];
                        current.history.push({
                            role: 'ai',
                            isStructured: parsed.isStructured,
                            content: parsed.content,
                            intro: parsed.intro,
                            origin: parsed.origin,
                            originDesc: parsed.originDesc,
                            concept: parsed.concept,
                            story: parsed.story,
                            conceptImage: conceptImage,
                            revealed: 1
                        });
                        current.recommendations = parsed.recs;
                        return newStack;
                    });
                } catch (err) {
                    setLayerStack(prev => {
                        const newStack = [...prev];
                        newStack[newStack.length - 1].history.push({ role: 'ai', isStructured: false, content: "설명을 불러오는 중 오류가 발생했어. 다시 시도해줘." });
                        return newStack;
                    });
                } finally {
                    setIsLoading(false);
                }
            };

            const handleFollowUp = async (msg) => {
                if (!msg.trim() || !currentLayer) return;

                setLayerStack(prev => {
                    const newStack = [...prev];
                    newStack[newStack.length - 1].history.push({ role: 'user', content: msg });
                    return newStack;
                });
                setIsLoading(true);

                const context = currentLayer.history.map(h => `${h.role === 'user' ? '질문자' : '김수석 선생님'}: ${h.content || h.origin}`).join('\n');
                const prompt = `${context}\n\n위 대화 흐름을 이어가며 질문에 답변해줘.`;

                try {
                    const responseText = await callGemini(prompt, followUpSystemPrompt);
                    const stackWords = layerStack.map(l => l.word);
                    const parsed = parseAIResponse(responseText, stackWords);

                    setLayerStack(prev => {
                        const newStack = [...prev];
                        const current = newStack[newStack.length - 1];
                        current.history.push({
                            role: 'ai',
                            isStructured: parsed.isStructured,
                            content: parsed.content,
                            intro: parsed.intro,
                            origin: parsed.origin,
                            originDesc: parsed.originDesc,
                            concept: parsed.concept,
                            story: parsed.story,
                            revealed: 1
                        });
                        if (parsed.recs.length > 0) {
                            current.recommendations = parsed.recs;
                        }
                        return newStack;
                    });
                } catch (err) {
                    console.error(err);
                    setLayerStack(prev => {
                        const newStack = [...prev];
                        newStack[newStack.length - 1].history.push({ role: 'ai', isStructured: false, content: "오류가 발생했어. 잠시 후 다시 말해줄래?" });
                        return newStack;
                    });
                } finally {
                    setIsLoading(false);
                }
            };

            const handleReveal = (idx, step) => {
                setLayerStack(prev => {
                    const newStack = [...prev];
                    const currentLayer = newStack[newStack.length - 1];
                    const newHistory = [...currentLayer.history];
                    newHistory[idx] = { ...newHistory[idx], revealed: step };
                    newStack[newStack.length - 1] = { ...currentLayer, history: newHistory };
                    return newStack;
                });
                setTimeout(() => {
                    const scrollContainer = document.getElementById('chat-scroll-container');
                    if (scrollContainer) {
                        scrollContainer.scrollTo({
                            top: scrollContainer.scrollHeight,
                            behavior: 'smooth'
                        });
                    }
                }, 50);
            };

            // --- Views ---

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-[100dvh] px-4 py-6">
                    <div className="bg-white p-8 md:p-12 rounded-[2rem] shadow-xl w-full max-w-lg border-t-8 border-blue-600 flex flex-col justify-center text-center">
                        <div className="mb-8 flex justify-center">
                            <div className="w-24 h-24 md:w-28 md:h-28 flex items-center justify-center">
                                <img
                                    src="https://res.cloudinary.com/dms5vyofw/image/upload/v1766382489/%E1%84%80%E1%85%B5%E1%86%B7%E1%84%89%E1%85%AE%E1%84%89%E1%85%A5%E1%86%A8%E1%84%8B%E1%85%A1%E1%84%8B%E1%85%B5%E1%84%8F%E1%85%A9%E1%86%AB_%E1%84%85%E1%85%A1%E1%84%8B%E1%85%B5%E1%86%AB_%E1%84%8F%E1%85%A5%E1%86%AF%E1%84%85%E1%85%A51_snx7la.png"
                                    alt="김수석 선생님 캐릭터"
                                    className="w-full h-full object-contain drop-shadow-md"
                                />
                            </div>
                        </div>
                        <h1 className="text-3xl md:text-4xl font-black text-slate-800 mb-4 tracking-tight">김수석 과학 선생님</h1>
                        <p className="text-slate-500 text-lg md:text-xl leading-relaxed mb-10 font-medium">
                            어려운 과학 용어, <br />
                            <span className="text-blue-600 font-bold">어원</span>으로 쪼개고 <span className="text-blue-600 font-bold">스토리</span>로 기억해!
                        </p>

                        <form onSubmit={(e) => { e.preventDefault(); handleSearch(e.target.search.value); }} className="relative mb-6 group">
                            <input
                                name="search"
                                type="text"
                                placeholder="어떤 단어가 궁금해?"
                                className="w-full pl-6 pr-14 py-4 md:py-5 rounded-2xl border-2 border-slate-200 focus:border-blue-500 focus:outline-none transition-all text-lg shadow-sm focus:shadow-md bg-slate-50 focus:bg-white"
                                style={{ fontSize: '16px' }}
                                autoFocus
                            />
                            <button type="submit" className="absolute right-2 top-1/2 transform -translate-y-1/2 p-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 active:scale-95 transition-all shadow-md group-focus-within:bg-blue-700">
                                <SearchIcon />
                            </button>
                        </form>
                    </div>
                </div>
            );

                    <div id="chat-scroll-container" onScroll={handleScroll} className="flex-1 overflow-y-auto px-1.5 md:px-3 pb-4 pt-[80px] md:pt-[88px] bg-transparent scrollbar-hide">

                                            <div className="mr-2 md:mr-3 flex-shrink-0 mt-1">
                                                <img
                                                    src="https://res.cloudinary.com/dms5vyofw/image/upload/v1766382489/%E1%84%80%E1%85%B5%E1%86%B7%E1%84%89%E1%85%AE%E1%84%89%E1%85%A5%E1%86%A8%E1%84%8B%E1%85%A1%E1%84%8B%E1%85%B5%E1%84%8F%E1%85%A9%E1%86%AB_%E1%84%85%E1%85%A1%E1%84%8B%E1%85%B5%E1%86%AB_%E1%84%8F%E1%85%A5%E1%86%AF%E1%84%85%E1%85%A51_snx7la.png"
                                                    alt="김수석"

                                            </div>
                                            <div className={`chat-bubble ai ai-content shadow-sm`}>
                                                <div dangerouslySetInnerHTML={{ __html: processContent(msg.content) }} />
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-3">
                                            {/* 0. 도입부 말풍선 */}
                                            {msg.intro && (
                                                <div className="flex justify-start mb-2">
                                                    <div className="mr-2 md:mr-3 flex-shrink-0 mt-1">
                                                        <img src="https://res.cloudinary.com/dms5vyofw/image/upload/v1766382489/%E1%84%80%E1%85%B5%E1%86%B7%E1%84%89%E1%85%AE%E1%84%89%E1%85%A5%E1%86%A8%E1%84%8B%E1%85%A1%E1%84%8B%E1%85%B5%E1%84%8F%E1%85%A9%E1%86%AB_%E1%84%85%E1%85%A1%E1%84%8B%E1%85%B5%E1%86%AB_%E1%84%8F%E1%85%A5%E1%86%AF%E1%84%85%E1%85%A51_snx7la.png" alt="김수석" className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-white border border-slate-200 object-cover p-0.5 shadow-sm" />
                                                    </div>
                                                    <div className="flex flex-col max-w-[calc(100%-2.5rem)]">
                                                        <div className="chat-bubble ai ai-content shadow-sm !mr-0">

                                            {/* 1. 어원 */}
                                            <div className="flex justify-start mb-2">

                                                    {/* 도입부가 있으면 프로필 이미지 대신 여백을 주어 자연스럽게 이어지도록 함 */}

                                                </div>
                                                <div className="flex flex-col max-w-[calc(100%-2.5rem)]">

                                                    <div className="chat-bubble ai ai-content shadow-sm !mr-0"><div dangerouslySetInnerHTML={{ __html: processContent(msg.origin || msg.content) }} /></div>

                                            </div>

                                            {/* 1-1. 어원 설명 (말풍선 추가) */}
                                            {msg.originDesc && (
                                                <div className="flex justify-start mb-2">
                                                    <div className="mr-2 md:mr-3 flex-shrink-0 mt-1">
                                                        <div className="w-8 h-8 md:w-10 md:h-10 invisible"></div>
                                                    </div>
                                                    <div className="flex flex-col max-w-[calc(100%-2.5rem)]">
                                                        <div className="chat-bubble ai ai-content shadow-sm !mr-0"><div dangerouslySetInnerHTML={{ __html: processContent(msg.originDesc) }} /></div>

                                            {/* 개념 버튼 */}
                                            {msg.revealed < 2 && (
                                                <div className="flex justify-center my-2 animate-fade-in">

                                                        <BeakerIcon className="w-4 h-4 text-blue-600" /> 개념 설명도 볼래? 👇
                                                    </button>
                                                </div>
                                            )}

                                            {/* 2. 개념 */}
                                            {msg.revealed >= 2 && (

                                                            {/* 개념 이미지가 존재할 경우 상단에 렌더링 */}

                                                ))}
                                            </div>
                                            <div className="mt-4 pt-4 border-t border-slate-100 flex justify-end gap-2">
                                                {layerStack.length > 1 && (
                                                    <button
                                                        onClick={() => setLayerStack(prev => prev.slice(0, -1))}
                                                        className="flex items-center gap-1 px-3 py-1.5 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors"
                                                    >
                                                        <ChevronLeftIcon className="w-4 h-4" />
                                                        이전 단어로
                                                    </button>
                                                )}
                                                <button
                                                    onClick={() => { setView('home'); setLayerStack([]); }}
                                                    className="flex items-center gap-1 px-3 py-1.5 text-sm font-bold text-white bg-slate-800 hover:bg-slate-900 rounded-lg transition-colors"
                                                >
                                                    <HomeIcon className="w-4 h-4" />
                                                    홈으로
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}

                        {isLoading && (
                            <div className="flex justify-start mb-6">
                                <div className="mr-2 md:mr-3 mt-1">
                                    <img
                                        src="https://res.cloudinary.com/dms5vyofw/image/upload/v1766382489/%E1%84%80%E1%85%B5%E1%86%B7%E1%84%89%E1%85%AE%E1%84%89%E1%85%A5%E1%86%A8%E1%84%8B%E1%85%A1%E1%84%8B%E1%85%B5%E1%84%8F%E1%85%A9%E1%86%AB_%E1%84%85%E1%85%A1%E1%84%8B%E1%85%B5%E1%86%AB_%E1%84%8F%E1%85%A5%E1%86%AF%E1%84%85%E1%85%A51_snx7la.png"
                                        alt="김수석"
                                        className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-white border border-slate-200 object-cover p-0.5 shadow-sm"
                                    />
                                </div>
                                <div className="chat-bubble ai typing-indicator bg-white border border-slate-200">
                                    <span></span><span></span><span></span>
                                </div>
                            </div>
                        )}
                        <div ref={chatEndRef} className="h-4"></div>
                    </div>

                    {/* Input */}
                    <div className="p-3 bg-white border-t border-slate-100">
                        <form
                            onSubmit={(e) => {
                                e.preventDefault();
                                handleFollowUp(e.target.msg.value);
                                e.target.msg.value = '';
                            }}
                            className="flex gap-2 items-center"
                        >
                            <div className="flex-1 relative">
                                <input
                                    name="msg"
                                    type="text"
                                    placeholder="추가 질문을 해봐!"
                                    className="w-full pl-5 pr-4 py-3 bg-slate-100 border-0 rounded-full focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-base"
                                    style={{ fontSize: '16px' }}
                                    autoComplete="off"
                                />
                            </div>
                            <button type="submit" disabled={isLoading} className="bg-blue-600 text-white p-3.5 rounded-full hover:bg-blue-700 active:scale-90 transition shadow-lg disabled:opacity-50 disabled:shadow-none">
                                <SendIcon className="w-5 h-5" />
                            </button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="font-sans antialiased">
                    {view === 'home' && renderHome()}
                    {view === 'chat' && renderChat()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
